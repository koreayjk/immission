<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM Mission — News</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #042C53; --blue: #185FA5; --blue-light: #E6F1FB;
  --green: #1D9E75; --off-white: #F7F6F2;
  --text: #1a1a1a; --text-muted: #6b6b6b; --border: rgba(0,0,0,0.08);
  --amber: #BA7517;
}
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--off-white); }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px; height: 64px;
  background: rgba(4,44,83,0.97); backdrop-filter: blur(8px);
}
.nav-logo { display: flex; align-items: center; gap: 10px; color: #fff; text-decoration: none; }
.nav-logo-mark { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--green); display: flex; align-items: center; justify-content: center; }
.nav-logo-mark span { font-family: 'Cormorant Garamond', serif; font-size: 14px; font-weight: 600; color: #fff; }
.nav-logo-text { font-size: 13px; font-weight: 500; letter-spacing: 0.06em; color: #B5D4F4; }
.nav-back { font-size: 12px; color: var(--green); text-decoration: none; padding: 7px 16px; border: 0.5px solid rgba(29,158,117,0.4); border-radius: 30px; transition: all 0.2s; }
.nav-back:hover { background: rgba(29,158,117,0.1); }

.main { max-width: 720px; margin: 0 auto; padding: 100px 24px 80px; }

.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--blue); text-decoration: none; margin-bottom: 32px; transition: gap 0.2s; }
.back-link:hover { gap: 10px; }

.article { background: #fff; border-radius: 16px; overflow: hidden; border: 0.5px solid var(--border); }
.article-img { width: 100%; max-height: 520px; object-fit: contain; display: block; background: #f0f0f0; }
.article-img-placeholder { width: 100%; height: 200px; background: #0C447C; display: flex; align-items: center; justify-content: center; }
.article-img-placeholder span { color: rgba(255,255,255,0.4); font-size: 13px; }
.article-body { padding: 36px 40px 48px; }
.article-cat { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 12px; }
.cat-mission { color: var(--green); }
.cat-prayer { color: var(--blue); }
.cat-testimony { color: var(--amber); }
.article-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(24px, 4vw, 36px); font-weight: 400; line-height: 1.2; color: var(--navy); margin-bottom: 12px; }
.article-date { font-size: 12px; color: var(--text-muted); margin-bottom: 28px; padding-bottom: 28px; border-bottom: 0.5px solid var(--border); }
.article-content { font-size: 15px; color: var(--text-muted); line-height: 1.9; white-space: pre-wrap; }

.loading { text-align: center; padding: 80px 0; color: var(--text-muted); font-size: 14px; }
.error { text-align: center; padding: 80px 0; color: var(--text-muted); }

footer { background: #021A33; padding: 28px 48px; text-align: center; margin-top: 48px; }
footer a { color: var(--green); text-decoration: none; font-size: 13px; display: inline-block; margin-bottom: 8px; }
footer p { font-size: 11px; color: rgba(255,255,255,0.25); }

@media (max-width: 768px) {
  nav { padding: 0 20px; }
  .main { padding: 90px 16px 60px; }
  .article-body { padding: 24px 20px 36px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-mark"><span>IM</span></div>
    <span class="nav-logo-text">International Mission</span>
  </a>
  <a href="news.html" class="nav-back">← News</a>
</nav>

<div class="main">
  <a href="news.html" class="back-link">← Back to all news</a>
  <div id="article-wrap">
    <p class="loading">Loading...</p>
  </div>
</div>

<footer>
  <a href="index.html">← Back to IM Mission Home</a>
  <p>© 2025 International Mission (IM선교회). All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://illbgsjvhsciougzjgwn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_EmIn4ZpTksxxbq7vXWTk4w_Wc38j9yH';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function getCatClass(cat) {
  if (!cat) return '';
  if (cat.toLowerCase().includes('prayer')) return 'cat-prayer';
  if (cat.toLowerCase().includes('testimony')) return 'cat-testimony';
  return 'cat-mission';
}

async function loadArticle() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const wrap = document.getElementById('article-wrap');

  if (!id) {
    wrap.innerHTML = '<p class="error">Article not found. <a href="news.html" style="color:var(--blue)">Go back</a></p>';
    return;
  }

  const { data: n, error } = await _supabase.from('news').select('*').eq('id', id).single();

  if (error || !n) {
    wrap.innerHTML = '<p class="error">Article not found. <a href="news.html" style="color:var(--blue)">Go back</a></p>';
    return;
  }

  document.title = `${n.title || 'News'} — IM Mission`;

  const contentPhoto = n.contentPhotoUrl || n.photoUrl;

  wrap.innerHTML = `
    <article class="article">
      ${contentPhoto
        ? `<img src="${contentPhoto}" alt="${n.title||''}" class="article-img">`
        : `<div class="article-img-placeholder"><span>Mission Photo</span></div>`}
      <div class="article-body">
        <p class="article-cat ${getCatClass(n.category)}">${n.category||''}</p>
        <h1 class="article-title">${n.title||''}</h1>
        <p class="article-date">${n.date||''}</p>
        ${n.body ? `<p class="article-content">${n.body}</p>` : ''}
      </div>
    </article>`;
}

window.addEventListener('DOMContentLoaded', loadArticle);
</script>
</body>
</html>
