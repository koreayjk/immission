<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM Mission — News & Prayer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #042C53; --blue: #185FA5; --blue-light: #E6F1FB;
  --green: #1D9E75; --off-white: #F7F6F2;
  --text: #1a1a1a; --text-muted: #6b6b6b; --border: rgba(0,0,0,0.08);
}
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; color: var(--text); background: #fff; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px; height: 64px;
  background: rgba(4,44,83,0.97); backdrop-filter: blur(8px);
}
.nav-logo { display: flex; align-items: center; gap: 10px; color: #fff; text-decoration: none; }
.nav-logo-mark { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--green); display: flex; align-items: center; justify-content: center; }
.nav-logo-mark span { font-family: 'Cormorant Garamond', serif; font-size: 14px; font-weight: 600; color: #fff; }
.nav-logo-text { font-size: 13px; font-weight: 500; letter-spacing: 0.06em; color: #B5D4F4; }
.nav-back { font-size: 12px; color: var(--green); text-decoration: none; padding: 7px 16px; border: 0.5px solid rgba(29,158,117,0.4); border-radius: 30px; transition: all 0.2s; }
.nav-back:hover { background: rgba(29,158,117,0.1); }

.page-hero { background: var(--navy); padding: 120px 48px 60px; position: relative; overflow: hidden; }
.page-hero::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,0.015) 60px,rgba(255,255,255,0.015) 61px), repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,0.015) 60px,rgba(255,255,255,0.015) 61px); }
.hero-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.18em; color: var(--green); text-transform: uppercase; margin-bottom: 16px; position: relative; }
.hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px,5vw,60px); font-weight: 300; color: #fff; line-height: 1.15; position: relative; }
.hero-title em { font-style: italic; color: #85B7EB; }

/* FILTER TABS */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; padding: 32px 48px 0; max-width: 1128px; margin: 0 auto; }
.filter-btn { font-size: 12px; font-weight: 500; padding: 8px 20px; border-radius: 30px; border: 0.5px solid var(--border); color: var(--text-muted); cursor: pointer; transition: all 0.2s; background: #fff; font-family: 'DM Sans', sans-serif; }
.filter-btn:hover { border-color: var(--blue); color: var(--blue); }
.filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

/* NEWS GRID */
.main { max-width: 1080px; margin: 0 auto; padding: 40px 48px 80px; }
.news-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
.n-card { border-radius: 10px; overflow: hidden; border: 0.5px solid var(--border); background: #fff; transition: transform 0.2s, box-shadow 0.2s; cursor: default; }
.n-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.07); }
.n-img { height: 200px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; background: #0C447C; }
.n-img img { width: 100%; height: 100%; object-fit: contain; background: #fff; }
.n-img span { color: rgba(255,255,255,0.4); font-size: 12px; position: absolute; }
.n-body { padding: 20px; }
.n-cat { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green); margin-bottom: 8px; }
.n-cat.prayer { color: var(--blue); }
.n-cat.testimony { color: var(--amber, #BA7517); }
.n-title { font-size: 15px; font-weight: 500; line-height: 1.45; margin-bottom: 8px; color: var(--text); }
.n-body-text { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 12px; }
.n-date { font-size: 11px; color: var(--text-muted); }
.n-empty { font-size: 14px; color: var(--text-muted); text-align: center; padding: 80px 0; grid-column: 1/-1; }
.n-loading { font-size: 13px; color: var(--text-muted); text-align: center; padding: 60px 0; grid-column: 1/-1; }

/* LOAD MORE */
.load-more-wrap { text-align: center; margin-top: 48px; }
.load-more-btn { font-size: 13px; font-weight: 500; color: var(--blue); border: 0.5px solid rgba(24,95,165,0.3); padding: 12px 32px; border-radius: 30px; background: var(--blue-light); cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
.load-more-btn:hover { background: #B5D4F4; }
.load-more-btn:disabled { opacity: 0.4; cursor: default; }

footer { background: #021A33; padding: 28px 48px; text-align: center; }
footer a { color: var(--green); text-decoration: none; font-size: 13px; display: inline-block; margin-bottom: 8px; }
footer p { font-size: 11px; color: rgba(255,255,255,0.25); }

@media (max-width: 768px) {
  nav { padding: 0 20px; }
  .page-hero { padding: 110px 24px 48px; }
  .filter-bar { padding: 24px 20px 0; }
  .main { padding: 32px 20px 60px; }
  .news-grid { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .news-grid { grid-template-columns: 1fr; }
}
  /* LIGHTBOX */
.lightbox-wrap { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; padding: 24px; cursor: zoom-out; }
.lightbox-wrap.open { display: flex; }
.lightbox-img { max-width: 100%; max-height: 90vh; border-radius: 8px; object-fit: contain; }
.lightbox-close { position: absolute; top: 16px; right: 20px; font-size: 28px; color: #fff; cursor: pointer; background: none; border: none; line-height: 1; }
  
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-mark"><span>IM</span></div>
    <span class="nav-logo-text">International Mission</span>
  </a>
  <a href="index.html" class="nav-back">← Home</a>
</nav>

<div class="page-hero">
  <p class="hero-eyebrow">IM Mission</p>
  <h1 class="hero-title">News & <em>Prayer</em></h1>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterNews('all', this)">All</button>
  <button class="filter-btn" onclick="filterNews('Mission News', this)">Mission News</button>
  <button class="filter-btn" onclick="filterNews('Prayer Request', this)">Prayer Request</button>
  <button class="filter-btn" onclick="filterNews('Testimony', this)">Testimony</button>
</div>

<div class="main">
  <div class="news-grid" id="news-grid">
    <p class="n-loading">Loading...</p>
  </div>
  <div class="load-more-wrap" id="load-more-wrap" style="display:none">
    <button class="load-more-btn" id="load-more-btn" onclick="loadMore()">Load more</button>
  </div>
</div>

<footer>
  <a href="index.html">← Back to IM Mission Home</a>
  <p>© 2025 International Mission (IM선교회). All rights reserved.</p>
</footer>
<div class="lightbox-wrap" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="">
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://illbgsjvhsciougzjgwn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_EmIn4ZpTksxxbq7vXWTk4w_Wc38j9yH';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PAGE_SIZE = 9;
let currentFilter = 'all';
let currentPage = 0;
let allLoaded = false;

function getCatClass(cat) {
  if (!cat) return '';
  if (cat.toLowerCase().includes('prayer')) return 'prayer';
  if (cat.toLowerCase().includes('testimony')) return 'testimony';
  return '';
}

function renderCards(news, append = false) {
  const grid = document.getElementById('news-grid');
  const cards = news.map(n => `
    <div class="n-card">
      <div class="n-img">
        ${n.photoUrl
          ? `<img src="${n.photoUrl}" alt="${n.title||''}" onclick="openLightbox('${n.photoUrl}')" style="cursor:zoom-in;">`
          : `<span>Mission Photo</span>`}
      </div>
      <div class="n-body">
        <p class="n-cat ${getCatClass(n.category)}">${n.category||''}</p>
        <p class="n-title">${n.title||''}</p>
        ${n.body ? `<p class="n-body-text">${n.body}</p>` : ''}
        <p class="n-date">${n.date||''}</p>
      </div>
    </div>`).join('');

  if (append) {
    grid.innerHTML += cards;
  } else {
    grid.innerHTML = cards || '<p class="n-empty">No posts yet.</p>';
  }
}

async function loadNews(append = false) {
  if (!append) {
    document.getElementById('news-grid').innerHTML = '<p class="n-loading">Loading...</p>';
    currentPage = 0;
    allLoaded = false;
  }

  let query = _supabase.from('news').select('*').order('id', { ascending: false })
    .range(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE - 1);

  if (currentFilter !== 'all') {
    query = query.eq('category', currentFilter);
  }

  const { data: news, error } = await query;

  if (error) {
    document.getElementById('news-grid').innerHTML = '<p class="n-empty">Failed to load.</p>';
    return;
  }

  if (!news || news.length === 0) {
    if (!append) document.getElementById('news-grid').innerHTML = '<p class="n-empty">No posts yet.</p>';
    allLoaded = true;
  } else {
    renderCards(news, append);
    if (news.length < PAGE_SIZE) allLoaded = true;
  }

  const wrap = document.getElementById('load-more-wrap');
  const btn = document.getElementById('load-more-btn');
  wrap.style.display = allLoaded ? 'none' : 'block';
  btn.disabled = false;
}

async function loadMore() {
  const btn = document.getElementById('load-more-btn');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  currentPage++;
  await loadNews(true);
  btn.textContent = 'Load more';
}

function filterNews(cat, el) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentFilter = cat;
  loadNews(false);
}
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeLightbox(); });
window.addEventListener('DOMContentLoaded', () => loadNews(false));
</script>
</body>
</html>
